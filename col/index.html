<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column | PNUO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.7;
      color: #333;
      background: #fdfdfd;
    }

    /* 专栏头部 */
    .header {
      text-align: center;
      margin: 40px 0;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .banner {
      width: 100%;
      height: 220px;
      background: #f0f0f0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      margin-bottom: 30px;
    }

    /* 文章内容 */
    #content {
      font-size: 17px;
      line-height: 1.8;
      padding-bottom: 60px;
    }
    #content h1, #content h2, #content h3 {
      margin: 1.2em 0 0.6em;
      line-height: 1.3;
    }
    #content p {
      margin: 0 0 1em;
    }
    #content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1em 0;
    }

    /* 签名 */
    .signature {
      text-align: center;
      padding: 20px 0 60px;
      color: #888;
      font-style: italic;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">PNUO Column</div>
    <div class="banner">专栏顶部形象图（可换成图片）</div>
  </div>

  <div id="content">
    加载中...
  </div>

  <div class="signature">
    — 手写文章 · 用心记录 —
  </div>

  <!-- Markdown 渲染引擎 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // 获取文章 ID：?id=001
    const params = new URLSearchParams(window.location.search)
    const id = params.get('id')

    const contentEl = document.getElementById('content')

    // 自动加载对应的 .md 文件
    async function loadArticle() {
      if (!id) {
        contentEl.innerHTML = '<h2>请选择文章</h2><p>例如：?id=001</p>'
        return
      }

      try {
        const res = await fetch(`./${id}.md`)
        const text = await res.text()
        // 自动把 MD 转成 HTML
        contentEl.innerHTML = marked.parse(text)
      } catch (err) {
        contentEl.innerHTML = '<h3>文章不存在</h3>'
      }
    }

    loadArticle()
  </script>
</body>
</html>
